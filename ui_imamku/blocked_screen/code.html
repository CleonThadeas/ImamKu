<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>

                    "colors": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-error {
            box-shadow: 0px 0px 40px rgba(147, 0, 10, 0.3);
        }
        .atmospheric-bg {
            background: radial-gradient(circle at center, #131b2e 0%, #0b1326 100%);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased atmospheric-bg min-h-screen flex items-center justify-center p-6">
<div class="max-w-xl w-full text-center">
<!-- Brand Identity -->
<div class="mb-12">
<span class="text-2xl font-black bg-gradient-to-br from-emerald-500 to-emerald-300 bg-clip-text text-transparent tracking-tighter">
                ImamKu
            </span>
</div>
<!-- Alert Container -->
<div class="bg-surface-container-low p-8 md:p-12 rounded-3xl shadow-2xl relative overflow-hidden">
<!-- Decorative Background Element -->
<div class="absolute -top-24 -right-24 w-48 h-48 bg-error-container/10 rounded-full blur-3xl"></div>
<!-- Alert Icon -->
<div class="mb-8 flex justify-center">
<div class="w-24 h-24 bg-error-container/20 rounded-full flex items-center justify-center glow-error border border-error-container/30">
<span class="material-symbols-outlined text-error text-6xl" data-icon="block" style="font-variation-settings: 'FILL' 1;">
                        block
                    </span>
</div>
</div>
<!-- Content -->
<div class="space-y-4">
<h1 class="text-3xl md:text-4xl font-bold tracking-tight text-on-surface">
                    Akun Diblokir
                </h1>
<p class="text-on-surface-variant text-lg leading-relaxed max-w-md mx-auto">
                    Akun Anda telah dinonaktifkan sementara karena poin kedisiplinan berada di bawah batas minimum.
                </p>
</div>
<!-- Stats/Context (Bento-style detail) -->
<div class="mt-10 grid grid-cols-2 gap-4">
<div class="bg-surface-container p-4 rounded-2xl border border-outline-variant/10 text-left">
<span class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1">Status Poin</span>
<span class="text-error font-bold text-xl">12 / 100</span>
</div>
<div class="bg-surface-container p-4 rounded-2xl border border-outline-variant/10 text-left">
<span class="block text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-1">Terakhir Aktif</span>
<span class="text-on-surface font-semibold text-lg">24 Okt 2023</span>
</div>
</div>
<!-- Actions -->
<div class="mt-10 flex flex-col sm:flex-row gap-4 justify-center">
<button class="bg-gradient-to-br from-primary-container to-primary text-on-primary-container px-8 py-4 rounded-xl font-bold text-base hover:scale-[1.02] active:scale-95 transition-all shadow-lg flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="support_agent">support_agent</span>
                    Hubungi Admin
                </button>
<button class="bg-surface-container-highest text-on-surface-variant px-8 py-4 rounded-xl font-bold text-base hover:bg-surface-bright transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl" data-icon="logout">logout</span>
                    Keluar
                </button>
</div>
</div>
<!-- Footer Help -->
<p class="mt-12 text-on-surface-variant/60 text-sm font-medium tracking-wide">
            Butuh bantuan lebih lanjut? Kunjungi <a class="text-primary hover:underline" href="#">Pusat Bantuan</a>
</p>
</div>
<!-- Background Decorative Textures -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 opacity-20">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-error/5 rounded-full blur-[120px]"></div>
</div>
