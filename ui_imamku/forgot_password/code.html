<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary": "#ffb95f",
                    "surface-container-low": "#131b2e",
                    "primary-container": "#10b981",
                    "error": "#ffb4ab",
                    "on-secondary-container": "#afb9cb",
                    "surface-variant": "#2d3449",
                    "surface": "#0b1326",
                    "tertiary-fixed": "#ffddb8",
                    "on-surface-variant": "#bbcabf",
                    "primary-fixed": "#6ffbbe",
                    "on-tertiary": "#472a00",
                    "secondary-fixed": "#d9e3f6",
                    "primary-fixed-dim": "#4edea3",
                    "surface-container-highest": "#2d3449",
                    "inverse-primary": "#006c49",
                    "on-error-container": "#ffdad6",
                    "on-tertiary-container": "#523200",
                    "on-tertiary-fixed": "#2a1700",
                    "tertiary-fixed-dim": "#ffb95f",
                    "secondary-fixed-dim": "#bdc7d9",
                    "on-secondary-fixed-variant": "#3d4756",
                    "on-primary-fixed-variant": "#005236",
                    "on-primary-fixed": "#002113",
                    "secondary": "#bdc7d9",
                    "error-container": "#93000a",
                    "tertiary-container": "#e29100",
                    "surface-tint": "#4edea3",
                    "on-surface": "#dae2fd",
                    "on-secondary-fixed": "#121c2a",
                    "secondary-container": "#404a59",
                    "inverse-on-surface": "#283044",
                    "on-background": "#dae2fd",
                    "primary": "#4edea3",
                    "surface-container": "#171f33",
                    "surface-bright": "#31394d",
                    "on-primary": "#003824",
                    "on-tertiary-fixed-variant": "#653e00",
                    "on-secondary": "#27313f",
                    "on-error": "#690005",
                    "outline-variant": "#3c4a42",
                    "on-primary-container": "#00422b",
                    "outline": "#86948a",
                    "surface-dim": "#0b1326",
                    "inverse-surface": "#dae2fd",
                    "surface-container-high": "#222a3d",
                    "surface-container-lowest": "#060e20",
                    "background": "#0b1326"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "2xl": "1rem",
                    "3xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .glass-effect {
        background: rgba(45, 52, 73, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
      }
      .kinetic-glow:hover {
        box-shadow: 0px 0px 20px rgba(16, 185, 129, 0.4);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar (Shared Component Execution) -->
<nav class="w-full top-0 sticky bg-[#0b1326] dark:bg-[#0b1326] z-50">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<div class="text-2xl font-bold tracking-tighter text-[#10b981] font-headline">
                ImamKu
            </div>
<div class="hidden md:flex items-center gap-8 font-['Inter'] font-medium tracking-tight">
<a class="text-[#bbcabf] hover:text-[#4edea3] transition-colors duration-300" href="#">Home</a>
<a class="text-[#bbcabf] hover:text-[#4edea3] transition-colors duration-300" href="#">About</a>
<a class="text-[#bbcabf] hover:text-[#4edea3] transition-colors duration-300" href="#">Donation</a>
</div>
<div class="flex items-center gap-4">
<button class="bg-[#10b981] text-[#003824] px-6 py-2 rounded-xl font-bold active:scale-95 transition-transform hover:bg-[#4edea3] transition-colors duration-300">
                    Login
                </button>
</div>
</div>
</nav>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 py-20 relative overflow-hidden">
<!-- Atmospheric Depth Background Elements -->
<div class="absolute top-1/4 -left-20 w-96 h-96 bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -right-20 w-80 h-80 bg-tertiary/5 rounded-full blur-[100px]"></div>
<div class="w-full max-w-md z-10">
<!-- Centered Reset Card -->
<div class="surface-container-low rounded-3xl p-8 md:p-10 shadow-[0px_12px_32px_rgba(0,0,0,0.2),0px_0px_8px_rgba(78,222,163,0.05)] border border-outline-variant/15 relative overflow-hidden">
<!-- Header Icon -->
<div class="flex justify-center mb-8">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high flex items-center justify-center text-primary-fixed-dim">
<span class="material-symbols-outlined text-4xl" data-icon="lock_reset">lock_reset</span>
</div>
</div>
<div class="text-center mb-8">
<h1 class="text-2xl md:text-3xl font-bold tracking-tight text-on-surface mb-3 font-headline">
                        Forgot Password?
                    </h1>
<p class="text-on-surface-variant body-md leading-relaxed">
                        Enter your email and we'll send you a link to reset your password.
                    </p>
</div>
<!-- Input Form -->
<form class="space-y-6">
<div class="space-y-2">
<label class="label-md block uppercase tracking-[0.05em] text-on-surface-variant pl-1" for="email">
                            Email address
                        </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-transparent focus:border-primary focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline/50 transition-all duration-300" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
</div>
</div>
<button class="w-full bg-gradient-to-br from-primary-container to-primary text-on-primary font-bold py-4 rounded-3xl kinetic-glow active:scale-95 transition-all duration-300 shadow-[0px_0px_15px_rgba(16,185,129,0.3)] flex items-center justify-center gap-2" type="submit">
<span>Reset Password</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Navigation Back -->
<div class="mt-10 text-center">
<a class="inline-flex items-center gap-2 text-on-surface-variant hover:text-primary transition-colors duration-300 group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform" data-icon="arrow_back">arrow_back</span>
<span class="label-md font-medium tracking-wide">Back to Login</span>
</a>
</div>
</div>
<!-- Contextual Information (Optional Aesthetic Support) -->
<div class="mt-8 grid grid-cols-1 gap-4 opacity-60">
<div class="flex items-center gap-3 px-4">
<span class="material-symbols-outlined text-primary-fixed-dim" data-icon="verified_user">verified_user</span>
<p class="text-xs text-on-surface-variant tracking-wider uppercase">Secure encryption enabled</p>
</div>
</div>
</div>
</main>
<!-- Footer (Shared Component Execution) -->
<footer class="w-full border-t border-[#3c4a42]/15 bg-[#0b1326] mt-auto">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-12 gap-4 max-w-7xl mx-auto">
<div class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest">
                © 2024 ImamKu Directive. All rights reserved.
            </div>
<div class="flex gap-8">
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Privacy Policy</a>
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Terms of Service</a>
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Support</a>
</div>
</div>
</footer>
</body></html>
