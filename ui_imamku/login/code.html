<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ImamKu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary": "#ffb95f",
                        "surface-container-low": "#131b2e",
                        "primary-container": "#10b981",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#afb9cb",
                        "surface-variant": "#2d3449",
                        "surface": "#0b1326",
                        "tertiary-fixed": "#ffddb8",
                        "on-surface-variant": "#bbcabf",
                        "primary-fixed": "#6ffbbe",
                        "on-tertiary": "#472a00",
                        "secondary-fixed": "#d9e3f6",
                        "primary-fixed-dim": "#4edea3",
                        "surface-container-highest": "#2d3449",
                        "inverse-primary": "#006c49",
                        "on-error-container": "#ffdad6",
                        "on-tertiary-container": "#523200",
                        "on-tertiary-fixed": "#2a1700",
                        "tertiary-fixed-dim": "#ffb95f",
                        "secondary-fixed-dim": "#bdc7d9",
                        "on-secondary-fixed-variant": "#3d4756",
                        "on-primary-fixed-variant": "#005236",
                        "on-primary-fixed": "#002113",
                        "secondary": "#bdc7d9",
                        "error-container": "#93000a",
                        "tertiary-container": "#e29100",
                        "surface-tint": "#4edea3",
                        "on-surface": "#dae2fd",
                        "on-secondary-fixed": "#121c2a",
                        "secondary-container": "#404a59",
                        "inverse-on-surface": "#283044",
                        "on-background": "#dae2fd",
                        "primary": "#4edea3",
                        "surface-container": "#171f33",
                        "surface-bright": "#31394d",
                        "on-primary": "#003824",
                        "on-tertiary-fixed-variant": "#653e00",
                        "on-secondary": "#27313f",
                        "on-error": "#690005",
                        "outline-variant": "#3c4a42",
                        "on-primary-container": "#00422b",
                        "outline": "#86948a",
                        "surface-dim": "#0b1326",
                        "inverse-surface": "#dae2fd",
                        "surface-container-high": "#222a3d",
                        "surface-container-lowest": "#060e20",
                        "background": "#0b1326"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glow-primary {
            box-shadow: 0px 0px 15px rgba(16, 185, 129, 0.3);
        }
        .glow-primary:hover {
            box-shadow: 0px 0px 25px rgba(16, 185, 129, 0.5);
        }
        .glass-overlay {
            background: rgba(45, 52, 73, 0.6);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
<!-- Ambient Decorative Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-tertiary/5 rounded-full blur-[120px] pointer-events-none"></div>
<main class="w-full max-w-md px-6 py-12 z-10">
<!-- Brand Identity -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 rounded-2xl bg-surface-container-high flex items-center justify-center mb-6 shadow-2xl">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="mosque" style="font-variation-settings: 'FILL' 1;">mosque</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tighter text-primary">ImamKu</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium uppercase tracking-[0.05em]">The Digital Sanctuary</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-low p-8 md:p-10 rounded-2xl shadow-[0px_12px_32px_rgba(0,0,0,0.2)] relative overflow-hidden">
<!-- Subtle Tonal Shift Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-white/[0.02] to-transparent pointer-events-none"></div>
<header class="relative z-10 mb-8">
<h2 class="text-xl font-bold text-on-surface tracking-tight">Welcome Back</h2>
<p class="text-on-surface-variant text-sm mt-1">Please enter your credentials to continue</p>
</header>
<form class="space-y-6 relative z-10">
<!-- Email Input -->
<div class="space-y-2">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest block" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-4 text-on-surface placeholder:text-outline-variant transition-all duration-300" id="email" name="email" placeholder="name@sanctuary.com" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest block" for="password">Password</label>
<a class="text-xs font-medium text-primary hover:text-primary-fixed-dim transition-colors duration-300" href="#">Forgot password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-lg" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-lowest border-none focus:ring-1 focus:ring-primary rounded-xl py-4 pl-12 pr-12 text-on-surface placeholder:text-outline-variant transition-all duration-300" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-lg" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center gap-3">
<input class="w-5 h-5 rounded border-none bg-surface-container-lowest text-primary focus:ring-primary focus:ring-offset-0" id="remember" type="checkbox"/>
<label class="text-sm text-on-surface-variant cursor-pointer select-none" for="remember">Remember this device</label>
</div>
<!-- Login Action -->
<button class="w-full bg-gradient-to-br from-primary-container to-primary py-4 rounded-2xl text-on-primary font-bold tracking-tight glow-primary transition-all active:scale-95 duration-200" type="submit">
                    Login to Dashboard
                </button>
</form>
<!-- Footer Links -->
<footer class="mt-10 pt-6 text-center border-t border-outline-variant/15 relative z-10">
<p class="text-on-surface-variant text-sm">
                    New to the community? 
                    <a class="text-primary font-bold ml-1 hover:underline underline-offset-4 transition-all" href="#">Register here</a>
</p>
</footer>
</div>
<!-- System Status/Metadata -->
<div class="mt-12 flex justify-between items-center px-2">
<div class="flex items-center gap-4">
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Server Secure</span>
</div>
</div>
<p class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">v2.4.0 Nocturnal</p>
</div>
</main>
<!-- Footer Component Logic -->
<footer class="w-full mt-auto bg-[#0b1326] border-t border-[#3c4a42]/15 flex flex-col md:flex-row justify-between items-center px-8 py-10 gap-4">
<p class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest">© 2024 ImamKu Directive. All rights reserved.</p>
<div class="flex gap-8">
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Privacy Policy</a>
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Terms of Service</a>
<a class="text-xs font-['Inter'] text-[#bbcabf] uppercase tracking-widest hover:text-[#10b981] transition-opacity duration-300" href="#">Support</a>
</div>
</footer>
</body></html>
