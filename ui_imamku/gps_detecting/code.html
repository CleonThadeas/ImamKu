<!DOCTYPE html>

<html class="dark" lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-primary-fixed-variant": "#005236",
                    "on-tertiary-fixed-variant": "#653e00",
                    "surface-variant": "#2d3449",
                    "tertiary-container": "#e29100",
                    "on-secondary-fixed-variant": "#3d4756",
                    "on-secondary-fixed": "#121c2a",
                    "surface-container": "#171f33",
                    "on-tertiary": "#472a00",
                    "on-primary-container": "#00422b",
                    "tertiary-fixed": "#ffddb8",
                    "tertiary": "#ffb95f",
                    "error": "#ffb4ab",
                    "primary": "#4edea3",
                    "on-secondary-container": "#afb9cb",
                    "on-surface-variant": "#bbcabf",
                    "surface-container-low": "#131b2e",
                    "surface-tint": "#4edea3",
                    "surface-container-high": "#222a3d",
                    "primary-fixed-dim": "#4edea3",
                    "on-background": "#dae2fd",
                    "tertiary-fixed-dim": "#ffb95f",
                    "surface-container-lowest": "#060e20",
                    "surface": "#0b1326",
                    "on-error": "#690005",
                    "on-tertiary-container": "#523200",
                    "error-container": "#93000a",
                    "background": "#0b1326",
                    "primary-container": "#10b981",
                    "on-surface": "#dae2fd",
                    "surface-container-highest": "#2d3449",
                    "secondary-fixed-dim": "#bdc7d9",
                    "on-error-container": "#ffdad6",
                    "surface-dim": "#0b1326",
                    "outline-variant": "#3c4a42",
                    "outline": "#86948a",
                    "inverse-surface": "#dae2fd",
                    "secondary-container": "#404a59",
                    "primary-fixed": "#6ffbbe",
                    "secondary-fixed": "#d9e3f6",
                    "on-primary-fixed": "#002113",
                    "inverse-primary": "#006c49",
                    "on-tertiary-fixed": "#2a1700",
                    "on-primary": "#003824",
                    "inverse-on-surface": "#283044",
                    "surface-bright": "#31394d",
                    "secondary": "#bdc7d9",
                    "on-secondary": "#27313f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Inter"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pulse-glow {
            box-shadow: 0 0 20px rgba(78, 222, 163, 0.2);
        }
        .radar-ring {
            border: 1px solid rgba(78, 222, 163, 0.1);
            border-radius: 50%;
            position: absolute;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased selection:bg-primary/30 min-h-screen flex flex-col">
<!-- TopAppBar suppressed for Transactional/Focused State -->
<main class="flex-grow flex items-center justify-center relative overflow-hidden px-6">
<!-- Atmospheric Background Element -->
<div class="absolute inset-0 z-0 pointer-events-none">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full"></div>
<!-- Radar Visual Elements -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[300px] h-[300px] radar-ring"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[450px] h-[450px] radar-ring"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] radar-ring"></div>
</div>
<div class="relative z-10 w-full max-w-md flex flex-col items-center text-center">
<!-- Centered Detecting State -->
<div class="relative mb-12">
<!-- Outer Pulse -->
<div class="absolute inset-0 bg-primary/20 rounded-full blur-xl scale-125"></div>
<!-- Inner Loading Icon -->
<div class="w-24 h-24 bg-surface-container-high rounded-full flex items-center justify-center relative z-10 border border-outline-variant/15 pulse-glow">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="location_searching">location_searching</span>
</div>
<!-- Orbiting Dot -->
<div class="absolute inset-0 -m-4">
<div class="w-full h-full border border-primary/20 rounded-full">
<div class="absolute top-0 left-1/2 -translate-x-1/2 -translate-y-1/2 w-3 h-3 bg-primary rounded-full shadow-[0_0_10px_rgba(78,222,163,0.8)]"></div>
</div>
</div>
</div>
<!-- Content Hierarchy -->
<div class="space-y-4">
<h1 class="text-2xl font-bold tracking-tight text-on-surface headline">
                    Mencari lokasi Anda...
                </h1>
<p class="text-on-surface-variant body-md max-w-[280px] mx-auto leading-relaxed">
                    Pastikan GPS Anda aktif untuk validasi kehadiran.
                </p>
</div>
<!-- Contextual Card (Inset Depth) -->
<div class="mt-16 w-full p-6 rounded-xl bg-surface-container-low border border-outline-variant/10">
<div class="flex items-start gap-4 text-left">
<div class="mt-1 w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-primary-fixed-dim" data-icon="info" data-weight="fill" style="font-variation-settings: 'FILL' 1;">info</span>
</div>
<div>
<p class="text-sm font-semibold text-on-surface mb-1 label-md tracking-wider">
                            TIPS KEHADIRAN
                        </p>
<p class="text-xs text-on-surface-variant leading-relaxed">
                            Akurasi GPS dipengaruhi oleh bangunan tinggi atau cuaca. Coba dekati area terbuka jika proses memakan waktu lama.
                        </p>
</div>
</div>
</div>
<!-- Action Button (Minimalist Secondary) -->
<button class="mt-10 px-8 py-3 rounded-full bg-surface-container-highest text-on-surface text-sm font-semibold tracking-wide hover:bg-surface-container-highest/80 transition-all duration-300 active:scale-95">
                Buka Pengaturan GPS
            </button>
</div>
</main>
<!-- Bottom Navigation Suppressed for Focused Task -->
<footer class="p-8 text-center relative z-10">
<div class="flex items-center justify-center gap-2">
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
<span class="text-[10px] font-bold text-on-surface-variant tracking-[0.2em] uppercase">ImamKu Sanctuary Security</span>
<div class="w-1.5 h-1.5 rounded-full bg-primary/40"></div>
</div>
</footer>
</body></html>
